syntax = "proto3";

package email;

option java_multiple_files = true;
option java_package = "vn.gtel.pm2.email.grpc.v1";

service EmailService {

  rpc SendEmail(EmailRequest)
      returns (EmailResponse);
}

message EmailRequest {

  string to = 1;
  string subject = 2;
  string body = 3;
}

message EmailResponse {

  string id = 1;
  string status = 2;
}